[alembic]
# Path to migration scripts
script_location = %(here)s/alembic

# Template for revision file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Truncate slug to this length
truncate_slug_length = 40

# sys.path modification
prepend_sys_path = .

# Version locations (single location)
version_locations = %(here)s/alembic/versions

# Connection URL — overridden by env.py at runtime (reads from .env)
sqlalchemy.url = postgresql+psycopg2://user:pass@localhost/laundry_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
